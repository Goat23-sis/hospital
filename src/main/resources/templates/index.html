<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Hospital API</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { cursor: pointer; padding: 8px 12px; }
        pre { background: #f4f4f4; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
<h1>Hospital Backend API</h1>

<div class="card">
    <h3>1. Swagger UI</h3>
    <p>Документация всех эндпоинтов:</p>
    <a href="/swagger-ui.html" target="_blank">Открыть Swagger</a>
</div>

<div class="card">
    <h3>2. Health Check</h3>
    <button onclick="fetch('/actuator/health').then(r=>r.text()).then(console.log)">Проверить статус</button>
</div>

<div class="card">
    <h3>3. Register User (POST)</h3>
    <form id="regForm">
        Username: <input type="text" id="username" required><br>
        Email: <input type="email" id="email" required><br>
        Password: <input type="password" id="password" required><br>
        Role: <select id="role">
        <option value="PATIENT">PATIENT</option>
        <option value="DOCTOR">DOCTOR</option>
        <option value="ADMIN">ADMIN</option>
    </select><br>
        <button type="submit">Зарегистрировать</button>
    </form>
    <pre id="regResult"></pre>
</div>

<script>
    document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            })
        });
        document.getElementById('regResult').textContent = await res.text();
    };
</script>
</body>
</html>
